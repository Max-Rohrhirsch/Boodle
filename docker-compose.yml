version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: boodle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boodle
      POSTGRES_USER: boodle_user
      POSTGRES_PASSWORD: boodle_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boodle_user -d boodle"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boodle_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/boodle
      SPRING_DATASOURCE_USERNAME: boodle_user
      SPRING_DATASOURCE_PASSWORD: boodle_secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boodle_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data: