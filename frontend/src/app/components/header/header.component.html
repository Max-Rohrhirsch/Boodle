<header class="header" *ngIf="shouldShowHeader()">
  <div class="header-inner">
    <a class="brand" [routerLink]="brandLink()">Boodle</a>

    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>

      <ng-container *ngIf="isAdmin()">
        <a routerLink="/admin/courses" routerLinkActive="active">Kurse</a>
        <a routerLink="/admin/lectures" routerLinkActive="active">Vorlesungen</a>
        <a routerLink="/admin/users" routerLinkActive="active">User</a>
      </ng-container>

      <ng-container *ngIf="isDozent()">
        <a routerLink="/dozent/lectures" routerLinkActive="active">Vorlesungsverwaltung</a>
        <a routerLink="/dozent/schedule" routerLinkActive="active">Stundenplan</a>
      </ng-container>
    </nav>

    <div class="user-actions">
      <span class="user-name">{{ authService.getCurrentUser()?.name }}</span>
      <button type="button" (click)="onLogout()">Logout</button>
    </div>
  </div>
</header>
