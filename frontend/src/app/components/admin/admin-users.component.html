<div class="admin-container">
  <div class="admin-header">
    <h1>User verwalten</h1>
    <button class="btn btn-primary" (click)="toggleForm()">
      {{ showForm() ? 'Abbrechen' : '+ Neuer User' }}
    </button>
  </div>

  <div class="form-section" *ngIf="showForm()">
    <h2>{{ editingMatr() ? 'User bearbeiten' : 'Neuen User erstellen' }}</h2>
    <form (ngSubmit)="onSubmit()">
      <input type="text" [(ngModel)]="formData.matr" name="matr" placeholder="Matrikelnummer" [readonly]="!!editingMatr()" required />
      <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Name" required />
      <input type="email" [(ngModel)]="formData.email" name="email" placeholder="E-Mail" required />
      <input *ngIf="!editingMatr()" type="password" [(ngModel)]="formData.password" name="password" placeholder="Passwort (min. 8 Zeichen)" required />
      <select [(ngModel)]="formData.rolle" name="rolle" required>
        <option value="">-- Rolle auswählen --</option>
        <option value="STUDENT">Student</option>
        <option value="DOZENT">Dozent</option>
        <option value="KURSSPRECHER">Kurssprecher</option>
        <option value="ADMIN">Admin</option>
      </select>
      <button type="submit" class="btn btn-success">{{ editingMatr() ? 'Aktualisieren' : 'Erstellen' }}</button>
    </form>
    <p *ngIf="message()" [ngClass]="messageType()">{{ message() }}</p>
  </div>

  <div class="list-section">
    <h2>Alle User</h2>
    <p *ngIf="loading()">Laden...</p>
    <table *ngIf="!loading() && users().length > 0">
      <thead>
        <tr>
          <th>Matrikelnummer</th>
          <th>Name</th>
          <th>E-Mail</th>
          <th>Rolle</th>
          <th>Aktionen</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users()">
          <td>{{ user.matr }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.rolle }}</td>
          <td>
            <button class="btn btn-sm btn-secondary" (click)="onEdit(user)">Bearbeiten</button>
            <button class="btn btn-sm btn-danger" (click)="onDelete(user.matr)">Löschen</button>
          </td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="!loading() && users().length === 0">Keine User gefunden.</p>
  </div>
</div>
