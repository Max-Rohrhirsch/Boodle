<div class="admin-container">
  <div class="admin-header">
    <h1>Vorlesungen verwalten</h1>
    <button class="btn btn-primary" (click)="toggleForm()">
      {{ showForm() ? 'Abbrechen' : '+ Neue Vorlesung' }}
    </button>
  </div>

  <div class="form-section" *ngIf="showForm()">
    <h2>{{ editingId() ? 'Vorlesung bearbeiten' : 'Neue Vorlesung erstellen' }}</h2>
    <form (ngSubmit)="onSubmit()">
      <input type="text" [(ngModel)]="formData.code" name="code" placeholder="Vorlesungscode" required />
      <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Name" required />
      <input type="text" [(ngModel)]="formData.beschreibung" name="beschreibung" placeholder="Beschreibung" required />
      <input type="text" [(ngModel)]="formData.studiengang" name="studiengang" placeholder="Studiengang" required />
      <input type="text" [(ngModel)]="formData.dozentMatr" name="dozentMatr" placeholder="Dozent Matrikelnummer" required />
      <button type="submit" class="btn btn-success">{{ editingId() ? 'Aktualisieren' : 'Erstellen' }}</button>
    </form>
    <p *ngIf="message()" [ngClass]="messageType()">{{ message() }}</p>
  </div>

  <div class="list-section">
    <h2>Alle Vorlesungen</h2>
    <p *ngIf="loading()">Laden...</p>
    <table *ngIf="!loading() && vorlesungen().length > 0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Code</th>
          <th>Name</th>
          <th>Studiengang</th>
          <th>Dozent</th>
          <th>Aktionen</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let v of vorlesungen()">
          <td>{{ v.id }}</td>
          <td>{{ v.code }}</td>
          <td>{{ v.name }}</td>
          <td>{{ v.studiengang }}</td>
          <td>{{ v.dozentMatr }}</td>
          <td>
            <button class="btn btn-sm btn-secondary" (click)="onEdit(v)">Bearbeiten</button>
            <button class="btn btn-sm btn-danger" (click)="onDelete(v.id)">Löschen</button>
          </td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="!loading() && vorlesungen().length === 0">Keine Vorlesungen gefunden.</p>
  </div>
</div>
